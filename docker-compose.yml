services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mizeta
      POSTGRES_PASSWORD: mizeta_dev_only
      POSTGRES_DB: mizeta_mail_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mizeta -d mizeta_mail_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
